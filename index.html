<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Fonts import for premium Azerbaijani language glyphs support -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Brend loqosunun Google axtarış nəticələrində favicon olaraq görünməsi üçün link -->
    <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Title və Meta teqləri Google Axtarış Optimizasiyası üçün -->
    <title>AsanBiznesim </title>
    <meta name="description" content="Bir kliklə, bütün biznes ehtiyaclarını, firmaları, fakturaları və srokları idarə et! React-based fully responsive premium portal." />
    
    <!-- Google Sayt Adı Metadata Teqləri -->
    <meta name="application-name" content="AsanBiznesim" />
    <meta property="og:site_name" content="AsanBiznesim" />
    <meta property="og:title" content="AsanBiznesim - Ağıllı İdarəetmə Paneli" />
    <meta property="og:description" content="Bir kliklə bütün biznes ehtiyaclarını, firmaları, fakturaları və srokları idarə et!" />
    <meta property="og:image" content="/img/logo.svg" />
    <meta property="og:type" content="website" />
    
    <!-- Google Botları üçün Strukturlaşdırılmış Sayt Adı Verilənləri (Schema JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AsanBiznesim",
      "alternateName": "Asan Biznesim",
      "url": "https://asanbiznesim.az"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
